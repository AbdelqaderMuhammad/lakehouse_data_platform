services:
  postgres:
    image: postgres:16.8
    container_name: postgres

    environment:
      POSTGRES_DB: nessie
      POSTGRES_USER: nessie
      POSTGRES_PASSWORD: nessie

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    ports:
      - "9000:9000"
      - "9001:9001"

    healthcheck:
      test: ["CMD", "minio", "server", "health", "live"]
      interval: 30s
      timeout: 20s
      retries: 3
    entrypoint: |
      /bin/sh -c "
      (
        sleep 3
        until mc alias set batman http://localhost:9000 admin password123; do 
          sleep 1
        done
        mc mb batman/warehouse --ignore-existing
      ) &
      minio server /data --console-address ':9001'
      "

    volumes:
      - minio_data:/data

  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.6
    container_name: nessie

    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_healthy

    ports:
      - "19120:19120"
  
    environment:
      nessie.version.store.type: JDBC2
      quarkus.datasource.db-kind: postgresql
      quarkus.datasource.username: nessie
      quarkus.datasource.password: nessie
      quarkus.datasource.jdbc.url: jdbc:postgresql://postgres:5432/nessie
      nessie.catalog.default-warehouse: warehouse
      nessie.catalog.warehouses.warehouse.location: s3://warehouse/
      nessie.catalog.service.s3.default-options.endpoint: http://minio:9000
      nessie.catalog.service.s3.default-options.path-style-access: "true"
      nessie.catalog.service.s3.default-options.auth-type: STATIC
      nessie.catalog.service.s3.default-options.region: us-east-1
      nessie.catalog.service.s3.default-options.access-key: urn:nessie-secret:quarkus:minio-creds
      minio-creds.name: admin
      minio-creds.secret: password123

  python-dev:
    image: python:3.12
    container_name: python-dev
    working_dir: /app
    volumes:
      - ./:/app
    command: /bin/sh -c "pip install pyiceberg[s3,nessie] pandas requests s3fs pyarrow && tail -f /dev/null"


volumes:
  postgres_data:
  minio_data: