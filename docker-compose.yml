

include:
  - path: compose/airflow.yml

services:

  # ─────────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # UI:  http://localhost:9001  (minioadmin / minioadmin)
  # API: http://localhost:9000
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse &&
        echo 'Bucket warehouse is ready.'
      "
    networks:
      - lakehouse

  # ─────────────────────────────────────────────
  # Iceberg REST catalog — Apache official fixture
  # API: http://localhost:8181
  # ─────────────────────────────────────────────
  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lakehouse

  # ─────────────────────────────────────────────
  # Jupyter — Python dev environment with PyIceberg
  # URL: http://localhost:8888  (token: iceberg)
  # ─────────────────────────────────────────────
  jupyter:
    build:
      context: .
      dockerfile: jupyter.Dockerfile
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: iceberg
      PYICEBERG_CATALOG__DEFAULT__TYPE: rest
      PYICEBERG_CATALOG__DEFAULT__URI: http://iceberg-rest:8181
      PYICEBERG_CATALOG__DEFAULT__WAREHOUSE: s3://warehouse/
      PYICEBERG_CATALOG__DEFAULT__S3__ENDPOINT: http://minio:9000
      PYICEBERG_CATALOG__DEFAULT__S3__PATH_STYLE_ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      iceberg-rest:
        condition: service_healthy
    networks:
      - lakehouse

volumes:
  minio_data:

networks:
  lakehouse:
    driver: bridge